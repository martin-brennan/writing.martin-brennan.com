- slug: "000006"
  title: Low Tide Dunes
  description: 'My friend invited me to a day out on his boat in the waterways around <a href="https://en.wikipedia.org/wiki/South_Stradbroke_Island">South Stradbroke Island</a>. It was an excellent winter''s day and the weather was with us, the sun was out and there wasn''t too much wind or high swell. This was taken at <a href="https://en.wikipedia.org/wiki/Jumpinpin_Channel">Jumpinpin</a> which is an area that constantly shifts and changes due to the wind and the tide.'
  camera: Chinon CM-4s
  lens: Chinon 50mm f1.9
  stock: Kodak Gold 200
  width: 3024
  height: 2005
  order: 6

